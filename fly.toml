# Despliegue de tuNota en Fly.io (app existente: tunota.fly.dev)
# Región US (dfw): Tavily bloquea la búsqueda desde datacenters no-US (gru daba 403).
app = "tunota"
primary_region = "dfw"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
