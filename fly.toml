# Despliegue de tuNota en Fly.io (app existente: tunota.fly.dev)
# Región US (dfw): Tavily bloquea la búsqueda desde datacenters no-US (gru daba 403).
app = "tunota"
primary_region = "dfw"

[env]
  PORT = "8080"
  # Modo público: /api/data no guarda ni comparte nada; cada navegador es 100% local.
  # Imprescindible con múltiples usuarios (sin esto todos compartirían un mismo db.json).
  TUNOTA_PUBLIC = "1"
  # IA del servidor DESACTIVADA en producción: nunca se usan las claves del dueño.
  # Los usuarios usan su propia clave de API (BYOK). Para reactivar (plan pago con
  # claves del dueño), pon "0" y define OPENCODE_API/TAVILY como `fly secrets set`.
  TUNOTA_DISABLE_AI = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
