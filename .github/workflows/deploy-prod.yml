# Producción: se despliega en Fly.io SOLO al hacer push a `main`.
# Requiere el secreto FLY_API_TOKEN en el repo (Settings → Secrets → Actions).
# La IA del servidor va desactivada por fly.toml (TUNOTA_DISABLE_AI=1): no se usan
# las claves del dueño; cada usuario usa su propia clave de API.
name: Desplegar producción (Fly.io)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy a Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
